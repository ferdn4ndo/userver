# Images: Docker Hub ferdn4ndo/userver-auth (see upstream .github/workflows/create_release_container.yaml).
# environment: fixes paths for the release image and overrides stray MIGRATE_BIN/APP_BIN from .env
# (dev bind-mount values break the binary at /app/main).
services:
  userver-auth:
    image: ferdn4ndo/userver-auth:${USERVER_AUTH_IMAGE_TAG:-latest}
    container_name: userver-auth
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MIGRATE_BIN: /app/main
      APP_BIN: /app/main

networks:
  default:
    name: nginx-proxy
    external: true
